<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login - RideTogether</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #f9f9f9;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            animation: fadeIn 0.5s ease;
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: white;
            border: 1px solid #e5e5e5;
            padding: 35px;
            border-radius: 8px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.06);
            transition: box-shadow .25s ease;
        }

        .card:hover {
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.09);
        }

        .card h1 {
            font-size: 26px;
            margin-bottom: 5px;
        }

        .card p {
            font-size: 14px;
            color: #666;
            margin-bottom: 25px;
        }

        .message {
            background: #ffecec;
            border-left: 3px solid red;
            padding: 10px;
            margin-bottom: 15px;
            font-size: 13px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            font-size: 12px;
            color: #666;
            display: block;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 11px;
            border: 1px solid #ddd;
            border-radius: 4px;
            transition: border .2s, box-shadow .2s;
        }

        input:focus {
            outline: none;
            border-color: black;
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.05);
        }

        /* button */

        button {
            width: 100%;
            padding: 13px;
            background: black;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            transition: background .25s, transform .15s;
        }

        button:hover {
            background: #333;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        /* register */

        .register {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }

        .register a {
            color: black;
            font-weight: 600;
            text-decoration: none;
        }

        .register a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="card">

        <h1>Welcome back</h1>
        <p>Login to RideTogether</p>

        {% if messages %}
        {% for msg in messages %}
        <div class="message">{{ msg }}</div>
        {% endfor %}
        {% endif %}

        <form method="post" action="">
            {% csrf_token %}

            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>

            <button type="submit">Login</button>

        </form>

        <div class="register">
            Don't have an account?
            <a href="{% url 'register' %}">Register</a>
        </div>

    </div>

</body>

</html>
