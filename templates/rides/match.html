<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Ride Matches</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ffffff;
            color: #111;
        }

        /* Page Container */

        .container {
            max-width: 900px;
            margin: auto;
            padding: 60px 20px;
        }

        /* Header */

        .header {
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .header p {
            color: #6b7280;
            font-size: 15px;
        }

        /* Ride Cards */

        .rides {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card {
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
            background: white;
        }

        .card:hover {
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
        }

        /* Route */

        .route {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .arrow {
            margin: 0 6px;
            color: #9ca3af;
        }

        /* Info */

        .meta {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            font-size: 13px;
            color: #6b7280;
        }

        /* Button */

        .call-btn {
            background: black;
            color: white;
            padding: 10px 18px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .call-btn:hover {
            background: #333;
        }

        /* No rides */

        .no-rides {
            text-align: center;
            padding: 60px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            color: #6b7280;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="header">
            <h1>Available Rides</h1>
            <p>Browse rides shared by commuters on your route.</p>
        </div>

        <div class="rides">

            {% if rides %}

            {% for ride in rides %}

            <div class="card">

                <div>

                    <div class="route">
                        {{ ride.source }}
                        <span class="arrow">→</span>
                        {{ ride.destination }}
                    </div>

                    <div class="meta">
                        <span>{{ ride.date }}</span>
                        <span>{{ ride.time }}</span>
                        <span>Driver: {{ ride.user.username }}</span>
                    </div>

                </div>

                <a href="tel:{{ ride.phone_number }}" class="call-btn">
                    Call
                </a>

            </div>

            {% endfor %}

            {% else %}

            <div class="no-rides">
                No rides available right now.
            </div>

            {% endif %}

        </div>

    </div>

</body>

</html>
