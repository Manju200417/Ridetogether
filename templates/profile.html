<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Profile – RideTogether</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #f9f9f9;
            color: black;
        }

        /* MAIN */

        main {
            max-width: 900px;
            margin: auto;
            padding: 40px 20px;
        }

        /* PROFILE HEADER */

        .profile-header {
            background: white;
            border: 1px solid #ddd;
            padding: 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: black;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
        }

        .profile-info h1 {
            font-size: 20px;
            margin-bottom: 4px;
        }

        .profile-info .handle {
            font-size: 14px;
            color: #666;
        }

        /* STATS */

        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            border: 1px solid #ddd;
            padding: 20px;
            text-align: center;
        }

        .stat-num {
            font-size: 22px;
            font-weight: bold;
        }

        .stat-label {
            font-size: 13px;
            color: #666;
        }

        /* ACCOUNT DETAILS */

        .card {
            background: white;
            border: 1px solid #ddd;
            padding: 20px;
        }

        .card-title {
            font-weight: bold;
            margin-bottom: 15px;
        }

        .detail-row {
            margin-bottom: 12px;
        }

        .detail-row label {
            font-size: 12px;
            color: #777;
            display: block;
            margin-bottom: 2px;
        }

        .detail-value {
            background: #f5f5f5;
            padding: 8px;
            border: 1px solid #ddd;
        }
    </style>

</head>

<body>

    {% include "nav.html" %}

    <main>

        <!-- PROFILE HEADER -->

        <div class="profile-header">

            <div class="avatar">
                {{ request.user.username|first|upper }}
            </div>

            <div class="profile-info">
                <h1>{{ request.user.first_name }}</h1>
                <div class="handle">@{{ request.user.username }}</div>
            </div>

        </div>

        <!-- STATS -->

        <div class="stats-row">

            <div class="stat-card">
                <div class="stat-num">{{ total_rides }}</div>
                <div class="stat-label">Rides Posted</div>
            </div>

            <div class="stat-card">
                <div class="stat-num">{{ total_matches }}</div>
                <div class="stat-label">Matches</div>
            </div>

        </div>

        <!-- ACCOUNT DETAILS -->

        <div class="card">

            <div class="card-title">Account Details</div>

            <div class="detail-row">
                <label>Username</label>
                <div class="detail-value">{{ request.user.username }}</div>
            </div>

            <div class="detail-row">
                <label>Email</label>
                <div class="detail-value">{{ request.user.email }}</div>
            </div>
            
            <div class="detail-row">
                <label>Date Joined</label>
                <div class="detail-value">{{ request.user.date_joined }}</div>
            </div>

        </div>

    </main>

</body>

</html>
